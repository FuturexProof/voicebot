<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: system-ui; margin: 20px; }
    h1 { color: #333; }
    input, button { padding: 8px; font-size: 14px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
    .actions { margin: 20px 0; }
    .actions a { margin-right: 10px; padding: 8px 12px; background: #0078d4;
                 color: white; text-decoration: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Benutzerverwaltung</h1>
  <input id="search" placeholder="Suche nach Name/Email/Stadt…" size="40">
  <button onclick="load()">Suchen</button>
  <div class="actions">
    <a href="/admin/api/export.json">JSON Export</a>
    <a href="/admin/api/export.csv">CSV Export</a>
    <a href="/admin/api/stats.pdf">PDF Statistik</a>
  </div>
  <table id="tbl">
    <thead><tr><th>Name</th><th>Email</th><th>Telefon</th><th>Stadt</th><th>Erstellt</th></tr></thead>
    <tbody></tbody>
  </table>
  <script>
    async function load() {
      const q = document.getElementById('search').value;
      const r = await fetch('/admin/api/users?q=' + encodeURIComponent(q));
      const users = await r.json();
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = users.map(u => `
        <tr><td>${u.FirstName} ${u.LastName}</td><td>${u.Email}</td>
        <td>${u.Phone}</td><td>${u.City}</td>
        <td>${new Date(u.CreatedAt).toLocaleString('de-DE')}</td></tr>`).join('');
    }
    load();
  </script>
</body>
</html>
